<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - ROJGAR</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="../index.html" style="text-decoration: none;"><h2>ROJGAR.</h2></a>
            </div>
        </div>
    </nav>

    <section class="section" style="padding: 100px 0;">
        <div class="container" style="text-align: center; max-width: 600px;">
            <div style="font-size: 80px; margin-bottom: 30px;">🎉</div>
            <h1 style="margin-bottom: 20px; font-size: 48px; text-transform: uppercase;">Payment Successful!</h1>
            <p style="font-size: 20px; font-weight: 700; margin-bottom: 40px; opacity: 0.8;">Thank you for your purchase. We've sent the download links to your registered email address.</p>
            
            <div style="background: white; padding: 40px; border: 4px solid #000; box-shadow: 15px 15px 0px 0px var(--highlight-color); text-align: left; margin-bottom: 60px;">
                <h3 style="margin-bottom: 25px; text-transform: uppercase;">Order Details</h3>
                <p style="font-weight: 800; margin-bottom: 10px;">Order ID: <span style="color: var(--secondary-color);">#RG-829310</span></p>
                <p style="font-weight: 800; margin-bottom: 10px;">Status: Paid ⚡</p>
                <p style="font-weight: 800; margin-bottom: 25px;">Product: <span id="purchasedProduct" style="color: var(--accent-color);">Loading...</span></p>
                
                <a href="#" class="btn btn-primary btn-block" style="padding: 20px; font-size: 20px;">Download Files Now 📥</a>
            </div>

            <a href="../index.html" style="font-weight: 900; text-transform: uppercase; text-decoration: none; border-bottom: 3px solid var(--secondary-color); color: inherit;">← Back to Homepage</a>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p style="font-weight: 700; font-size: 12px; text-align: center;">&copy; 2025 ROJGAR. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('product');
        const products = {
            'reels-kit': 'Instagram Reels Mastery Kit',
            'canva-templates': 'Canva Templates Bundle',
            'resume-pack': 'Resume + Cover Letter Pack',
            'notion-planner': 'Notion Second Brain',
            'complete-bundle': 'Complete Creator Bundle'
        };
        document.getElementById('purchasedProduct').textContent = products[productId] || 'Digital Product Pack';
    </script>
</body>
</html>
