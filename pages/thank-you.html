<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - ROJGAR</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none;"><h2>ROJGAR.</h2></a>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container" style="text-align: center; max-width: 600px;">
            <div style="font-size: 80px; margin-bottom: 20px;">🎉</div>
            <h1 style="margin-bottom: 20px;">Payment Successful!</h1>
            <p style="font-size: 18px; color: var(--gray); margin-bottom: 40px;">Thank you for your purchase. We've sent the download links to your email address.</p>
            
            <div style="background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border-color); text-align: left; margin-bottom: 40px;">
                <h3 style="margin-bottom: 20px;">Your Order Details</h3>
                <p><strong>Order ID:</strong> #RG-829310</p>
                <p><strong>Status:</strong> Paid ⚡</p>
                <p><strong>Product:</strong> <span id="purchasedProduct">Loading...</span></p>
                <br>
                <a href="#" class="btn btn-primary btn-block">Download Files Now 📥</a>
            </div>

            <a href="index.html" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">← Back to Homepage</a>
        </div>
    </section>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('product');
        const products = {
            'reels-kit': 'Instagram Reels Mastery Kit',
            'canva-templates': 'Canva Templates Bundle',
            'resume-pack': 'Resume + Cover Letter Pack',
            'notion-planner': 'Notion Second Brain',
            'complete-bundle': 'Complete Creator Bundle'
        };
        document.getElementById('purchasedProduct').textContent = products[productId] || 'Digital Product Pack';
    </script>
</body>
</html>
