<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ROJGAR</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="../index.html" style="text-decoration: none;"><h2>ROJGAR.</h2></a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html#products">Products</a></li>
                <li><a href="../index.html#categories">Categories</a></li>
                <li><a href="../index.html#about">About</a></li>
                <li><a href="contact.html">Support</a></li>
            </ul>
            <button class="menu-toggle" id="menuToggle" style="display: none; background: none; border: none; font-size: 24px; cursor: pointer;">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <section class="section" style="padding: 60px 0;">
        <div class="container">
            <div class="about-grid">
                
                <div class="reveal-init">
                    <div style="background: var(--white); border: 2px solid var(--border-color); box-shadow: 15px 15px 0px 0px #000; overflow: hidden; margin-bottom: 20px;">
                        <img id="mainImg" src="" alt="" style="width: 100%; height: auto; display: block;">
                    </div>
                </div>

                <div class="reveal-init">
                    <div style="background: var(--highlight-color); border: 2px solid var(--border-color); padding: 5px 15px; display: inline-block; font-weight: 900; font-size: 13px; margin-bottom: 15px; box-shadow: 4px 4px 0px 0px #000; text-transform: uppercase;" id="pTag"></div>
                    <h1 id="pName" style="font-size: clamp(36px, 6vw, 60px); margin: 10px 0 20px; font-weight: 900; text-transform: uppercase; line-height: 1; letter-spacing: -2px;"></h1>
                    <p id="pDesc" style="font-size: 18px; color: var(--dark); margin-bottom: 40px; font-weight: 500; opacity: 0.8;"></p>
                    
                    <div style="background: var(--white); padding: 40px; border: 2px solid var(--border-color); box-shadow: 10px 10px 0px 0px #000; margin-bottom: 40px;">
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                            <span id="pPrice" style="font-size: 48px; font-weight: 900;"></span>
                            <span id="pMRP" style="text-decoration: line-through; opacity: 0.5; font-size: 24px; font-weight: 700;"></span>
                            <span style="background: var(--accent-color); color: white; border: 2px solid var(--border-color); padding: 4px 15px; font-size: 14px; font-weight: 900;">60% OFF</span>
                        </div>
                        <p style="color: var(--secondary-color); font-weight: 900; font-size: 14px; text-transform: uppercase; margin-bottom: 30px;">⚡ FLASH DEAL - ENDS IN 02:45</p>
                        <a id="buyBtn" href="checkout.html" class="btn btn-primary btn-block" style="padding: 20px; font-size: 18px;">UNLOCK ACCESS NOW</a>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div style="display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 900; text-transform: uppercase;">
                            <i class="fas fa-bolt" style="color: var(--highlight-color); text-shadow: 1px 1px 0px #000;"></i>
                            <span>Instant Download</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 900; text-transform: uppercase;">
                            <i class="fas fa-infinity" style="color: var(--accent-color);"></i>
                            <span>Lifetime Access</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <h2 style="font-size: clamp(40px, 10vw, 100px); letter-spacing: -2px;">ROJGAR.</h2>
            <div class="footer-grid">
                <div>
                    <h4 style="margin-bottom: 20px;">Support</h4>
                    <ul class="footer-links">
                        <li><a href="../index.html#about">About Us</a></li>
                        <li><a href="contact.html">Contact Hub</a></li>
                        <li><a href="privacy.html">Privacy Policy</a></li>
                    </ul>
                </div>
            </div>
            <p style="font-weight: 700; font-size: 12px;">&copy; 2024 ROJGAR. BOLD DIGITAL SOLUTIONS.</p>
        </div>
    </footer>

    <script src="../js/script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const products = {
            'reels-kit': { tag: 'Creator Tools', name: 'Instagram Reels Kit', price: '₹199', mrp: '₹499', desc: '500+ Viral Hooks, Captions & High-Impact Ideas to explode your reach. The ultimate toolbox for modern creators.', img: '../images/products/reels-kit.png' },
            'canva-templates': { tag: 'Design System', name: 'Canva Bundle', price: '₹349', mrp: '₹699', desc: '120+ Fully editable social media templates for every niche. Stop designing from scratch and start shipping.', img: '../images/products/canva-templates.png' },
            'resume-pack': { tag: 'Career', name: 'ATS Resume Pack', price: '₹149', mrp: '₹399', desc: '15+ Modern, ATS-Optimized templates designed to get you noticed by top-tier tech recruiters globally.', img: '../images/products/ebook.png' },
            'notion-planner': { tag: 'Productivity', name: 'Notion Second Brain', price: '₹399', mrp: '₹799', desc: 'The only system you need to organize your life, tasks & projects. Built for maximum psychological flow.', img: '../images/products/ebook.png' }
        };
        const currentProduct = products[productId] || products['reels-kit'];
        document.getElementById('pTag').textContent = currentProduct.tag;
        document.getElementById('pName').textContent = currentProduct.name;
        document.getElementById('pDesc').textContent = currentProduct.desc;
        document.getElementById('pPrice').textContent = currentProduct.price;
        document.getElementById('pMRP').textContent = currentProduct.mrp;
        document.getElementById('mainImg').src = currentProduct.img;
        document.getElementById('buyBtn').href = 'checkout.html?id=' + productId;
    </script>
</body>
</html>
