<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ROJGAR</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none;"><h2>ROJGAR.</h2></a>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start;">
                
                <div class="reveal-init">
                    <div style="background: var(--gray); aspect-ratio: 1; border: 2px solid var(--border-color); border-radius: 24px; overflow: hidden; margin-bottom: 20px;">
                        <img id="mainImg" src="" alt="" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                </div>

                <div class="reveal-init">
                    <span id="pTag" style="color: var(--secondary-color); font-weight: 800; text-transform: uppercase; font-size: 14px; letter-spacing: 2px;"></span>
                    <h1 id="pName" style="font-size: 48px; margin: 15px 0; font-weight: 900; text-transform: uppercase;"></h1>
                    <p id="pDesc" style="font-size: 18px; color: var(--dark); margin-bottom: 30px; font-weight: 500;"></p>
                    
                    <div style="background: var(--white); padding: 35px; border: 2px solid var(--border-color); box-shadow: var(--shadow-md); margin-bottom: 30px;">
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                            <span id="pPrice" style="font-size: 40px; font-weight: 900;"></span>
                            <span id="pMRP" style="text-decoration: line-through; opacity: 0.5; font-size: 20px;"></span>
                            <span style="background: var(--accent-color); border: 2px solid var(--border-color); padding: 4px 12px; font-size: 14px; font-weight: 900;">SAVE 60%</span>
                        </div>
                        <p style="color: var(--secondary-color); font-weight: 800; font-size: 14px; text-transform: uppercase;">Offer ends soon</p>
                        <br>
                        <a id="buyBtn" href="#" class="btn btn-primary btn-block">Buy Now & Instant Access</a>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div style="display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; text-transform: uppercase;">
                            <i class="fas fa-check-circle" style="color: var(--secondary-color);"></i>
                            <span>Instant Download</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; text-transform: uppercase;">
                            <i class="fas fa-check-circle" style="color: var(--secondary-color);"></i>
                            <span>Lifetime Access</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container" style="text-align: center;">
            <p>&copy; 2024 ROJGAR. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const products = {
            'reels-kit': { tag: 'Creator Tools', name: 'Instagram Reels Mastery Kit', price: '₹199', mrp: '₹499', desc: '500+ Viral Hooks, Captions & Ideas to grow your account 10x.', img: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&q=80&w=800' },
            'canva-templates': { tag: 'Design', name: 'Canva Templates Bundle', price: '₹349', mrp: '₹699', desc: '120+ Fully editable social media templates for every niche.', img: 'https://images.unsplash.com/photo-1626785774573-4b799315345d?auto=format&fit=crop&q=80&w=800' },
            'resume-pack': { tag: 'Job/Career', name: 'Resume + Cover Letter Pack', price: '₹149', mrp: '₹399', desc: '15+ ATS-Optimized templates to land your dream job interviews.', img: 'https://images.unsplash.com/photo-1586281380349-632531db7ed4?auto=format&fit=crop&q=80&w=800' },
            'notion-planner': { tag: 'Productivity', name: 'Notion Second Brain', price: '₹399', mrp: '₹799', desc: 'Complete system to organize your life, tasks & projects in one place.', img: 'https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&q=80&w=800' },
            'complete-bundle': { tag: 'All-In-One', name: 'Complete Creator Bundle', price: '₹999', mrp: '₹2499', desc: 'Get access to all 8 premium products.', img: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=800' }
        };
        const currentProduct = products[productId] || products['reels-kit'];
        document.getElementById('pTag').textContent = currentProduct.tag;
        document.getElementById('pName').textContent = currentProduct.name;
        document.getElementById('pDesc').textContent = currentProduct.desc;
        document.getElementById('pPrice').textContent = currentProduct.price;
        document.getElementById('pMRP').textContent = currentProduct.mrp;
        document.getElementById('mainImg').src = currentProduct.img;
        document.getElementById('buyBtn').href = 'checkout.html?id=' + productId;
    </script>
</body>
</html>
